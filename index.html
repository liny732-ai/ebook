<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線上遊戲用語電子辭典</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #050505;
            color: #f8fafc;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            overflow: hidden; 
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* 霓虹光暈 */
        .glow-bg-1 {
            position: fixed; top: -20%; left: -10%; width: 50%; height: 50%;
            background: rgba(217, 70, 239, 0.15); border-radius: 50%; filter: blur(150px); pointer-events: none;
        }
        .glow-bg-2 {
            position: fixed; bottom: -20%; right: -10%; width: 50%; height: 50%;
            background: rgba(6, 182, 212, 0.15); border-radius: 50%; filter: blur(150px); pointer-events: none;
        }

        /* 3D 書本容器 */
        #book-wrapper {
            perspective: 2500px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease-out;
            position: relative;
        }

        .book {
            position: relative;
            width: 860px;
            height: 640px;
            transform-style: preserve-3d;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
        }

        .leaf {
            position: absolute;
            top: 0;
            right: 0;
            width: 50%;
            height: 100%;
            transform-style: preserve-3d;
            transform-origin: left center;
            transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
            cursor: pointer;
        }

        .leaf.flipped {
            transform: rotateY(-180deg);
        }

        .page-front, .page-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            background: #0d0d12;
            border: 1px solid #1e293b;
            box-sizing: border-box;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .page-front {
            transform: rotateY(0deg);
            background: linear-gradient(to right, #050508 0%, #0d0d12 8%, #0d0d12 100%);
            border-left: 1px solid #000;
            border-radius: 0 12px 12px 0;
        }

        .page-back {
            transform: rotateY(180deg);
            background: linear-gradient(to left, #050508 0%, #0d0d12 8%, #0d0d12 100%);
            border-right: 1px solid #000;
            border-radius: 12px 0 0 12px;
        }

        .page-content {
            padding: 2.5rem 3rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .page-number {
            position: absolute;
            bottom: 1.5rem;
            font-family: monospace;
            color: #475569;
            font-size: 0.875rem;
            font-weight: bold;
        }
        .page-front .page-number { right: 2.5rem; }
        .page-back .page-number { left: 2.5rem; }

        .cover-page {
            background: #050505 !important;
            border: 2px solid #d946ef33 !important;
            box-shadow: inset 0 0 80px rgba(217, 70, 239, 0.15) !important;
        }

        /* 注音側邊檢索列 */
        #thumb-index {
            position: fixed;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            z-index: 50;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(8px);
            padding: 0.5rem;
            border-radius: 1rem;
            border: 1px solid rgba(30, 41, 59, 0.8);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            max-height: 90vh;
            overflow-y: auto;
        }
        #thumb-index::-webkit-scrollbar { width: 0px; }

        .thumb-btn {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: bold;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .thumb-btn:hover, .thumb-btn.active {
            background: #d946ef;
            color: white;
            border-color: #f0abfc;
            box-shadow: 0 0 10px rgba(217, 70, 239, 0.6);
            transform: translateX(-4px);
        }

        .hide-scroll::-webkit-scrollbar { width: 4px; }
        .hide-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

        .controls {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 1rem;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div class="glow-bg-1"></div>
    <div class="glow-bg-2"></div>

    <div id="thumb-index"></div>

    <div id="book-wrapper">
        <div class="book" id="book">
            <!-- 書頁將由 JavaScript 動態生成 -->
        </div>
    </div>

    <!-- 底部控制項 -->
    <div class="controls backdrop-blur-md bg-black/40 px-6 py-3 rounded-full border border-slate-800 shadow-[0_0_20px_rgba(0,0,0,0.5)]">
        <button onclick="prevPage()" class="text-slate-400 hover:text-cyan-400 transition-colors flex items-center gap-2 font-bold text-sm">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            上一頁
        </button>
        <span class="text-slate-600 font-mono text-sm px-4 flex items-center border-x border-slate-700">
            ← / → 或 點擊書頁翻動
        </span>
        <button onclick="nextPage()" class="text-slate-400 hover:text-fuchsia-400 transition-colors flex items-center gap-2 font-bold text-sm">
            下一頁
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
        </button>
    </div>

    <script>
        const dictionaryData = [
            // 第一類：遊戲專業術語 (38項)
            { term: "兵線", bopomofo: "ㄅㄧㄥ ㄒㄧㄢˋ", pinyin: "bīng xiàn", english: "Minion Wave", etymology: "「兵」指小兵，「線」指行進路線。MOBA遊戲獨創概念，最早見於《DotA》社區討論。", definition: "由基地水晶定時生成、沿上路、中路、下路向前移動並互相廝殺的小兵序列；亦指雙方小兵交戰的地理位置。", example: "「先把中路兵線清了再打團，不然小兵會把我們的塔推掉。」" },
            { term: "增益", bopomofo: "ㄗㄥ ㄧˋ", pinyin: "zēng yì", english: "Buff", etymology: "源於20世紀70年代桌上角色扮演遊戲（TRPG），原指「魔法強化」，後進入MOBA。", definition: "遊戲賦予角色的臨時正面狀態，如提升攻擊力、生命回復等。亦指在版本更新中對弱勢英雄進行數值加強。", example: "「這版本下路AD被增益了，可以拿出來打核心。」" },
            { term: "冷卻", bopomofo: "ㄌㄥˇ ㄑㄩㄝˋ", pinyin: "lěng què", english: "Cooldown", etymology: "英文「Cool down」字面義「降溫」，引申為技能使用後的等待恢復期。", definition: "技能或主動裝備使用後需等待一段時間才能再次激活，該等待時間稱「冷卻時間」。", example: "「我大招還有10秒冷卻，先拉扯一下別硬接！」" },
            { term: "沉默", bopomofo: "ㄔㄣˊ ㄇㄛˋ", pinyin: "chén mò", english: "Silence", etymology: "借自漢語「沉默」本義「不說話」，在遊戲中喻指「技能被禁言」。", definition: "軟控的一種。受影響的英雄可以移動和普通攻擊，但無法施放任何技能。", example: "「我被沉默了！按不出技能！」" },
            { term: "打野", bopomofo: "ㄉㄚˇ ㄧㄝˇ", pinyin: "dǎ yě", english: "Jungler", etymology: "由「打」（攻擊）與「野」（野區）複合。在S1–S2賽季期間確立了固定地位。", definition: "通過擊殺野區中立野怪獲取資源，並承擔野區視野控制、全圖遊走突襲（Gank）和控龍職責的位置。", example: "「對面打野住在下路了，我們根本不敢推線。」" },
            { term: "輔助", bopomofo: "ㄈㄨˇ ㄓㄨˋ", pinyin: "fǔ zhù", english: "Support", etymology: "角色定位稱謂詞，從「協助」本義引申。早期僅為「插眼工具人」，後演變為「團隊大腦」。", definition: "主動放棄小兵經濟，承擔視野佈控、核心保護、先手開團等支援職責的位置。", example: "「輔助把巴龍坑視野做一下，準備打團了。」" },
            { term: "控制", bopomofo: "ㄎㄨㄥˋ ㄓˋ", pinyin: "kòng zhì", english: "Crowd Control", etymology: "英文直譯「人群控制」，源於MMORPG遊戲。", definition: "能夠剝奪、限制或改變敵方行動自由與施法狀態的技能。分「硬控」（暈眩、擊飛）與「軟控」（減速、沉默）。", example: "「注意接控制！別讓他把技能用出來！」" },
            { term: "龍", bopomofo: "ㄌㄨㄥˊ", pinyin: "lóng", english: "Dragon", etymology: "西方奇幻文化中的龍形象。巴龍「納什男爵」是對經典遊戲怪物「Roshan」的字母倒序致敬。", definition: "分佈於河道巢穴的超大型史詩野怪：下半區元素龍（小龍，擊殺累積永久屬性加成），上半區巴龍（擊殺後強化小兵與回城）。", example: "「這波聽我指揮，拿了龍就贏下對局了！」" },
            { term: "坦克", bopomofo: "ㄊㄢˇ ㄎㄜˋ", pinyin: "tǎn kè", english: "Tank", etymology: "軍事外來語借用。英文「Tank」原指裝甲戰車。口語中因其「血厚耐打」也被稱為「肉」。", definition: "具備極高防禦力，承擔前排肉盾、吸收傷害、打亂陣型並提供控制保護的英雄類型。", example: "「對面的傷害太高了，隊伍裡需要有人選坦克來扛傷！」" },
            { term: "團控", bopomofo: "ㄊㄨㄢˊ ㄎㄨㄥˋ", pinyin: "tuán kòng", english: "AoE Crowd Control", etymology: "「團隊控制」的壓縮。", definition: "作用範圍廣、能同時對多個敵方目標施加控制的強力技能，通常是開啟5v5團戰的核心引擎。", example: "「站位分散一點！對面全是團控，別被一鍋端了！」" },
            { term: "英雄", bopomofo: "ㄧㄥ ㄒㄩㄥˊ", pinyin: "yīng xióng", english: "Champion", etymology: "源自《魔獸爭霸Ⅲ》的「英雄單位」概念。", definition: "由玩家直接控制的虛擬角色，每個英雄擁有獨立的技能組、屬性成長線、造型及背景故事。", example: "「這個英雄傷害太過分了，建議下個版本直接砍掉。」" },
            { term: "野怪", bopomofo: "ㄧㄝˇ ㄍㄨㄞˋ", pinyin: "yě guài", english: "Neutral Creeps", etymology: "「野外怪物」的簡稱，借自傳統RPG遊戲。", definition: "散佈於野區各營地的中立生物，擊殺它們是打野位置的主要發育來源。", example: "「打野別來線上了，回你家野區刷你的野怪去吧。」" },
            { term: "野區", bopomofo: "ㄧㄝˇ ㄑㄩ", pinyin: "yě qū", english: "Jungle", etymology: "英文「Jungle」意為「叢林」，因早期MOBA地圖將非兵線區域設計為樹木叢生地貌而得名。", definition: "地圖中除三條兵線及雙方基地外，所有由牆體、草叢、河道迷霧和野怪營地組成的區域。", example: "「我家野區全是别人，這對局沒法玩了。」" },
            { term: "隱身", bopomofo: "ㄧㄣˇ ㄕㄣ", pinyin: "yǐn shēn", english: "Stealth", etymology: "傳統神話修辭借用，原指身形隱藏的法術。", definition: "英雄通過自身技能進入無法被敵方視覺直接觀察的狀態，用於繞後突襲、偵察或規避傷害。", example: "「帶掃描和真眼！對面有會隱身的刺客！」" },
            { term: "射手", bopomofo: "ㄕㄜˋ ㄕㄡˇ", pinyin: "shè shǒu", english: "ADC / Marksman", etymology: "英文「Attack Damage Carry」縮寫ADC，意為「物理傷害攜帶者」。", definition: "主要承擔持續性遠程物理普通攻擊傷害，是團隊中後期摧毀防禦塔的核心輸出位置。", example: "「四保一戰術的核心，就是不惜一切代價讓射手活下來輸出。」" },
            { term: "輸入緩衝", bopomofo: "ㄕㄨ ㄖㄨˋ ㄏㄨㄢˇ ㄔㄨㄥ", pinyin: "shū rù huǎn chōng", english: "Input Buffer", etymology: "「輸入」是按鍵，「緩衝」是暫存記憶。格鬥遊戲基礎機制。", definition: "在無法行動時按下的鍵會被系統記憶，等能行動時自動釋放的機制。", example: "「你在倒地時一直按起身踢，利用輸入緩衝，一起來就會踢出去。」" },
            { term: "優先權", bopomofo: "ㄧㄡ ㄒㄧㄢ ㄑㄩㄢˊ", pinyin: "yōu xiān quán", english: "Priority", etymology: "當兩個人同時出招，系統會依照內建規則決定誰打中誰。", definition: "當兩人同時出招，系統決定誰的招式效果先發生的判定規則。通常抓技優先於一般攻擊。", example: "「他出重拳，你出抓，因為抓的優先權高，你會先抓到他。」" },
            { term: "前搖", bopomofo: "ㄑㄧㄢˊ ㄧㄠˊ", pinyin: "qián yáo", english: "Startup", etymology: "「搖」指動作開始前的擺動。遊戲中每個攻擊都有預備動作。", definition: "攻擊打中敵人之前的準備動作。前搖越長，越容易被對手打斷。", example: "「這招前搖太長，你剛舉手就會被對方輕拳點掉。」" },
            { term: "判定框", bopomofo: "ㄆㄢˋ ㄉㄧㄥˋ ㄎㄨㄤ", pinyin: "pàn dìng kuāng", english: "Hitbox", etymology: "「判定」決定是否命中，「框」是範圍。隱藏的幾何圖形。", definition: "遊戲用來判斷「打中」還是「沒打中」的隱形碰撞範圍。", example: "「這招看起來沒碰到，但因為判定框很大，還是打中了。」" },
            { term: "後搖", bopomofo: "ㄏㄡˋ ㄧㄠˊ", pinyin: "hòu yáo", english: "Recovery", etymology: "相對「前搖」而來，指攻擊打完後的收招硬直時間。", definition: "打完一招之後，角色有一段時間不能做其他動作的收尾時間。", example: "「他重腳踢空後有很長後搖，快趁機打他。」" },
            { term: "冷卻時間 (CD)", bopomofo: "ㄌㄥˇ ㄑㄩㄝˋ ㄕˊ ㄐㄧㄢ", pinyin: "lěng què shí jiān", english: "Cooldown", etymology: "「冷卻」就是讓技能「降溫」休息。", definition: "某些強力技能用過之後要等一段時間才能再用的等待機制。", example: "「你的超必殺剛放完，冷卻時間還沒到，不能再用。」" },
            { term: "幀數", bopomofo: "ㄓㄣˋ ㄕㄨˋ", pinyin: "zhèn shù", english: "Frame", etymology: "「幀」就是遊戲畫面的一瞬間（通常1秒有60幀）。", definition: "用來衡量動作時間長短的單位。1秒有60幀，動作發生需要的幀數越少代表越快。", example: "「這招發生只需要3幀，非常快，幾乎躲不掉。」" },
            { term: "無敵幀", bopomofo: "ㄨˊ ㄉㄧˊ ㄓㄣˋ", pinyin: "wú dí zhèn", english: "I-frame", etymology: "「幀」是畫面瞬間。特定動作帶有不吃傷害的判定。", definition: "角色在翻滾、起身或放絕招時，有極短的時間完全不會受到傷害的狀態。", example: "「他起身的時候有無敵幀，不要在他剛起來的時候出招，會揮空。」" },
            { term: "霸體", bopomofo: "ㄅㄚˋ ㄊㄧˇ", pinyin: "bà tǐ", english: "Super Armor", etymology: "「霸」就是強勢不受影響。就像穿了鎧甲。", definition: "出招時遭受攻擊不會被打斷動作（但仍會承受傷害）的強勢狀態。", example: "「他現在有霸體，你輕拳打他他不會停，跟他換血你虧。」" },
            { term: "浮空", bopomofo: "ㄈㄨˊ ㄎㄨㄥ", pinyin: "fú kōng", english: "Launch", etymology: "「浮」是飄起來。格鬥與動作遊戲常見的連段起手。", definition: "被擊飛到空中，在空中時無法操作，落地前可以被繼續連招追打。", example: "「升龍拳把他打浮空，然後跳起來接一套空中連段。」" },
            { term: "僵直", bopomofo: "ㄐㄧㄤ ㄓˊ", pinyin: "jiāng zhí", english: "Stun / Recovery", etymology: "身體僵硬無法彎曲。被打中或防禦時的狀態。", definition: "角色被打中或被防住攻擊後，短時間內身體僵硬無法動作的狀態。", example: "「你重拳被防住了，會有僵直，對手趁機反擊你了。」" },
            { term: "投技", bopomofo: "ㄊㄡˊ ㄐㄧˋ", pinyin: "tóu jì", english: "Throw", etymology: "「投」就是抓起來摔。", definition: "一種無法防禦的近身抓取攻擊，敵人只能靠預判來跳開或拆解。", example: "「你一直防禦沒用，他會用投技抓你，你要跳起來或拆投。」" },
            { term: "升龍", bopomofo: "ㄕㄥ ㄌㄨㄥˊ", pinyin: "shēng lóng", english: "Dragon Punch", etymology: "來自《街頭霸王》的「昇龍拳」，後來所有類似的對空技都被統稱升龍。", definition: "一種強力的向上對空技能，可以打掉跳過來的敵人，但沒打中時破綻極大。", example: "「他跳過來，你用升龍把他打下來，但千萬別亂放，沒打到會被反擊。」" },
            { term: "連段", bopomofo: "ㄌㄧㄢˊ ㄉㄨㄢˋ", pinyin: "lián duàn", english: "Combo", etymology: "日文「連續技」的簡稱。最早在《快打旋風II》中被發現。", definition: "一套讓對手無法防禦或反擊的連續攻擊，總傷害通常高於單發招式。", example: "「輕拳接輕拳再接必殺技，這套連段可以打掉三分之一血。」" },
            { term: "續關", bopomofo: "ㄒㄩˋ ㄍㄨㄢ", pinyin: "xù guān", english: "Continue", etymology: "來自街機年代：輸了投幣可以繼續玩。", definition: "輸了一場後，可以再打一次，通常要投幣或消耗遊戲內的復活機會。", example: "「你還有一次復活機會，輸了可以續關，但要從頭打。」" },
            { term: "仇恨", bopomofo: "ㄔㄡˊ ㄏㄣˋ", pinyin: "chóu hèn", english: "Aggro", etymology: "原指怨恨。在遊戲中，誰打怪、補血、靠近，都會增加仇恨值。", definition: "怪物對玩家的憤怒值。仇恨最高者會成為怪物的優先攻擊目標。", example: "「你補血補太猛，仇恨跑到你身上了，快跑到坦克旁邊讓他把仇恨拉回去。」" },
            { term: "補師", bopomofo: "ㄅㄨˇ ㄕ", pinyin: "bǔ shī", english: "Healer", etymology: "「補」是補血，「師」是職業。《魔獸世界》團隊鐵三角之一。", definition: "負責幫隊友回復生命值的職業。團隊沒有補師就無法打副本。", example: "「補師注意坦克的血量，他快倒了，快丟大補。」" },
            { term: "仇恨列表", bopomofo: "ㄔㄡˊ ㄏㄣˋ ㄌㄧㄝˋ ㄅㄧㄠˇ", pinyin: "chóu hèn liè biǎo", english: "Threat Table", etymology: "「列表」是清單。記錄每個玩家對怪物的仇恨值排序。", definition: "顯示團隊中誰對怪物的仇恨最高。坦克必須維持在第一名。", example: "「你看仇恨列表，你現在第二名，再打兩下就搶贏坦克了。」" },
            { term: "副本", bopomofo: "ㄈㄨˋ ㄅㄣˇ", pinyin: "fù běn", english: "Dungeon", etymology: "「複本」的意思，指為每一隊獨立複製的地圖，互不干擾。", definition: "專門給小隊進入的獨立封閉地圖，內有強力首領怪物與寶物。", example: "「我們五個人組隊，去打這個副本，首領會掉好裝備。」" },
            { term: "首領", bopomofo: "ㄕㄡˇ ㄌㄧㄥˇ", pinyin: "shǒu lǐng", english: "Boss", etymology: "「Boss」英文原意是老闆。中文玩家習慣稱關卡最後的敵人為首領。", definition: "副本中最為強大、血量極多的敵人，通常擁有多階段的特殊致命技能。", example: "「小怪清完了，準備打首領，注意躲首領的範圍技。」" },
            { term: "狂暴", bopomofo: "ㄎㄨㄤˊ ㄅㄠˋ", pinyin: "kuáng bào", english: "Enrage", etymology: "指發狂。MMORPG中為了防止玩家無限制拖延戰鬥時間而設計的機制。", definition: "首領戰鬥時間過長未被擊殺時，會進入傷害暴增、足以秒殺全團的狀態。", example: "「快點輸出，首領快要狂暴了，狂暴後一下秒殺一個。」" },
            { term: "易傷", bopomofo: "ㄧˋ ㄕㄤ", pinyin: "yì shāng", english: "Vulnerability phase", etymology: "容易受傷。首領在某些階段會降低防禦。", definition: "首領受到額外傷害或防禦力大幅下降的階段，團隊需在此時集中火力輸出。", example: "「首領蹲下去了，易傷階段來了，所有人開大招打！」" },
            { term: "減益", bopomofo: "ㄐㄧㄢˇ ㄧˋ", pinyin: "jiǎn yì", english: "Debuff", etymology: "與增益(Buff)相反，指加在敵人或自己身上的負面效果。", definition: "讓目標暫時變弱、持續扣血或降低防禦的負面狀態。", example: "「術士給首領上詛咒減益，牠的攻擊力會降低。」" },

            // 第二類：實戰與戰術用語 (46項)
            { term: "補刀", bopomofo: "ㄅㄨˇ ㄉㄠ", pinyin: "bǔ dāo", english: "Last Hit", etymology: "源自《魔獸爭霸Ⅲ》自訂地圖，後由《英雄聯盟》社群繼承。", definition: "對小兵作出致命的最後一次攻擊，從而獨享該小兵陣亡的金幣與經驗。", example: "「10分鐘補刀100個，這是職業選手的基本功。」" },
            { term: "大招", bopomofo: "ㄉㄚˋ ㄓㄠ", pinyin: "dà zhāo", english: "Ultimate", etymology: "源自格鬥遊戲「必殺技」，在MOBA社群中簡稱為「大」。", definition: "英雄技能樹中威力最強、冷卻最長的核心絕招（預設鍵位R）。", example: "「對面的角色沒大！集火秒他！」" },
            { term: "發育", bopomofo: "ㄈㄚ ㄩˋ", pinyin: "fā yù", english: "Farm", etymology: "借用生物學「生長成熟」，對應英文Farm，指穩定獲取資源。", definition: "英雄通過補兵、刷野、拆塔獲取經驗與金幣，從而增強自身戰鬥力的過程。", example: "「慢慢發育等機會，我們後期裝備起來就能打。」" },
            { term: "反野", bopomofo: "ㄈㄢˇ ㄧㄝˇ", pinyin: "fǎn yě", english: "Counter-Jungle", etymology: "由「反向」與「打野」組合而成。", definition: "侵入敵方野區擊殺其野怪，以剝奪對方經濟經驗的壓制行為。", example: "「對面守護不了野區，看我去反野。」" },
            { term: "翻盤", bopomofo: "ㄈㄢ ㄆㄢˊ", pinyin: "fān pán", english: "Comeback", etymology: "傳統棋牌術語，原指扭轉敗局，後廣泛用於電競。", definition: "處於絕對劣勢的一方，透過防守或抓住敵方失誤，逆轉戰局獲勝。", example: "「只要主堡還沒爆，就還有翻盤的機會！」" },
            { term: "控線", bopomofo: "ㄎㄨㄥˋ ㄒㄧㄢˋ", pinyin: "kòng xiàn", english: "Freeze", etymology: "英文「Freeze」（冰凍）形象表達將兵線「凍結」在某位置的戰術。", definition: "僅對小兵進行尾刀，將雙方兵線交戰點卡在靠近己方防禦塔前的戰術。", example: "「兄弟們，我在上路控線，打野可以不用來幫我。」" },
            { term: "逆風", bopomofo: "ㄋㄧˋ ㄈㄥ", pinyin: "nì fēng", english: "Disadvantage", etymology: "航海術語，比喻行進阻力大，引申為局勢落後不順。", definition: "己方在經濟總量、裝備質量、防禦塔數量上全面落後，處於被動挨打的局面。", example: "「逆風就別出純輸出了，先補點防裝抗壓吧。」" },
            { term: "團戰", bopomofo: "ㄊㄨㄢˊ ㄓㄢˋ", pinyin: "tuán zhàn", english: "Team Fight", etymology: "「團隊戰鬥」的縮略。", definition: "雙方多名英雄聚集爆發的高強度、決定性的大規模戰鬥。", example: "「這波團戰完全決定了勝負，這場我們要贏了。」" },
            { term: "推線", bopomofo: "ㄊㄨㄟ ㄒㄧㄢˋ", pinyin: "tuī xiàn", english: "Push", etymology: "與「控線」互為對立戰術。將兵線推入敵方塔下。", definition: "通過範圍技能或高頻普攻快速清理敵方小兵，將交戰線推向敵方塔下。", example: "「趕緊幫我推線，我要回城購買裝備了。」" },
            { term: "走位", bopomofo: "ㄗㄡˇ ㄨㄟˋ", pinyin: "zǒu wèi", english: "Dodging", etymology: "傳統戲劇與體育術語移用，原指舞台上的移動路線。", definition: "控制英雄不斷位移，以躲避敵方技能，並調整自身安全輸出位置。", example: "「哇！這個走位！連躲三個技能，太不可思議了！」" },
            { term: "偷發育", bopomofo: "ㄊㄡ ㄈㄚ ㄩˋ", pinyin: "tōu fā yù", english: "Sneaky Farming", etymology: "民間口語造詞，帶有畫面感。", definition: "劣勢方利用敵方抱團推進的視野盲區，派人潛入邊線暗中清理資源以縮小經濟差。", example: "「你們在正面拖住他們，我去邊路偷一波發育。」" },
            { term: "一級團", bopomofo: "ㄧ ㄐㄧˊ ㄊㄨㄢˊ", pinyin: "yī jí tuán", english: "Level 1 Fight", etymology: "由「1級」與「團戰」拼合而成。", definition: "比賽剛開始、全員1級且小兵未出生前，抱團侵入敵方野區試圖奪取首殺的行動。", example: "「兄弟們出門搞快點，對面有一級入侵，小心被蹲！」" },
            { term: "抓人", bopomofo: "ㄓㄨㄚ ㄖㄣˊ", pinyin: "zhuā rén", english: "Gank", etymology: "「Gang Killing」（幫派圍剿）的簡縮，為早期電競俚語。", definition: "利用視野盲區突襲其他路線，形成人數優勢以擊殺敵方英雄。", example: "「對面打野一直來抓人，我上路沒法玩了。」" },
            { term: "拉扯", bopomofo: "ㄌㄚ ㄔㄜˇ", pinyin: "lā chě", english: "Kiting", etymology: "又稱「放風箏」，英文「Kiting」原意即放風箏。", definition: "利用射程或移速優勢，保持不被貼身的前提下，邊退邊輸出的打法。", example: "「這射手拉扯太強了，把近戰活活風箏死。」" },
            { term: "開團", bopomofo: "ㄎㄞ ㄊㄨㄢˊ", pinyin: "kāi tuán", english: "Engage", etymology: "「開啟團戰」的縮略。", definition: "擁有強突進或控場的英雄主動發起先手，強行觸發5v5團戰的行為。", example: "「等我的信號，我閃現開團，你們跟上！」" },
            { term: "越塔", bopomofo: "ㄩㄝˋ ㄊㄚˇ", pinyin: "yuè tǎ", english: "Turret Dive", etymology: "「越過防禦塔」的簡稱。", definition: "衝入敵方防禦塔射程內，頂著塔的傷害強行擊殺殘血敵人的高風險進攻。", example: "「沒兵線別越塔，塔打人超痛，三下你就沒了。」" },
            { term: "控場", bopomofo: "ㄎㄨㄥˋ ㄔㄤˇ", pinyin: "kòng chǎng", english: "Zone Control", etymology: "源自早期MMORPG與舞台術語，指控制場面的能力。", definition: "使用限制性技能或大範圍壓制力，來掌控戰局節奏與敵方行動空間。", example: "「這隻角色的控場能力太強了，對面完全動不了。」" },
            { term: "取消", bopomofo: "ㄑㄩˇ ㄒㄧㄠ", pinyin: "qǔ xiāo", english: "Cancel", etymology: "中斷目前動作。格鬥遊戲進階連段核心。", definition: "用一個新招式強行中斷前一個招式的收尾硬直，讓你接招更快。", example: "「輕拳後馬上取消接必殺技，對手就來不及防。」" },
            { term: "確反", bopomofo: "ㄑㄩㄝˋ ㄈㄢˇ", pinyin: "què fǎn", english: "Punish", etymology: "「確定」能「反擊」。格鬥遊戲術語。", definition: "對方出完破綻極大的招式後，你確定能打到他且他無法防禦的反擊。", example: "「他這招被防住後有很大硬直，你可以用輕拳確反。」" },
            { term: "目押", bopomofo: "ㄇㄨˋ ㄧㄚ", pinyin: "mù yā", english: "Link", etymology: "日文「目押し」，指用眼睛看節奏來精準按鍵。", definition: "用眼睛看準時機，在特定時間點按下按鍵才能連上的嚴苛連段技巧。", example: "「這套目押連段要練節奏，不能狂按，要看到打中的那一幀再按。」" },
            { term: "擇", bopomofo: "ㄗㄜˊ", pinyin: "zé", english: "Mix-up", etymology: "「擇」就是選擇。迫使敵人在兩種攻擊之間猜一個。", definition: "同時給敵人兩個不同方向的威脅（例如打下段或抓投），讓他只能猜一個防禦。", example: "「把他逼到角落後用上下擇，他要麼防下段被投，要麼拆投被掃腿。」" },
            { term: "拆投", bopomofo: "ㄔㄞ ㄊㄡˊ", pinyin: "chāi tóu", english: "Throw Tech", etymology: "「拆」解對方的「投」技。", definition: "在被對手抓到的瞬間，自己也按下抓技鍵，就能掙脫不被摔。", example: "「他看到你要抓他，就按拆投，你沒摔到他反而被打。」" },
            { term: "受身", bopomofo: "ㄕㄡˋ ㄕㄣ", pinyin: "shòu shēn", english: "Ukemi", etymology: "日文「受身」，指倒地時翻滾化解衝擊。", definition: "被打倒在地時，在碰地前按鍵快速滾起，避免後續的倒地壓制。", example: "「快按受身，不然他會在旁邊等你起來繼續打你。」" },
            { term: "打背", bopomofo: "ㄉㄚˇ ㄅㄟˋ", pinyin: "dǎ bèi", english: "Cross-up", etymology: "字面意思是「從背後攻擊」。", definition: "跳過敵人頭頂攻擊其背部，迫使防禦方必須反向輸入防禦指令的技巧。", example: "「你一直站著防禦沒用，他跳過來打背，你要反向防。」" },
            { term: "差合", bopomofo: "ㄔㄚ ㄏㄜˊ", pinyin: "chā hé", english: "Whiff Punish", etymology: "日文「差し合い」，利用對手出招時伸長的瞬間攻擊其肢體。", definition: "對手出招時手腳伸出來，你用更遠的招式打他的手或腳，讓他打空卻被你打中。", example: "「他重腳踢過來，你用更遠的輕腳差合，就能踢到他的腿。」" },
            { term: "壓起身", bopomofo: "ㄧㄚ ㄑㄧˇ ㄕㄣ", pinyin: "yā qǐ shēn", english: "Okizeme", etymology: "「壓」制對方從倒地狀態「起身」的瞬間。", definition: "對手倒地後，你站在旁邊等他站起來的那一瞬間出手打他，讓他來不及防。", example: "「他倒地了，快去壓起身，他一起來就出下段攻擊。」" },
            { term: "安全跳", bopomofo: "ㄢ ㄑㄩㄢˊ ㄊㄧㄠˋ", pinyin: "ān quán tiào", english: "Safe Jump", etymology: "不會被反擊的跳躍攻擊。", definition: "一種抓準時機的跳躍攻擊，就算被對手起身用無敵技反擊，自己也能安全落地防禦。", example: "「這個安全跳練熟以後，對手根本不敢亂升龍。」" },
            { term: "波升戰術", bopomofo: "ㄅㄛ ㄕㄥ ㄓㄢˋ ㄕㄨˋ", pinyin: "bō shēng zhàn shù", english: "Zoning", etymology: "「波」是氣功波，「升」是升龍。隆與肯的經典戰術。", definition: "遠處一直放氣功，逼對方跳過來，再用對空升龍技把他打下來。", example: "「他用波升戰術，你不要傻傻跳，用走路慢慢靠近。」" },
            { term: "立回", bopomofo: "ㄌㄧˋ ㄏㄨㄟˊ", pinyin: "lì huí", english: "Neutral Game", etymology: "日文「立ち回り」。指雙方正式交手前，靠走位試探的階段。", definition: "雙方還沒近身交手前，互相走位、出輕拳試探、騙招的空間拉扯階段。", example: "「立回階段不要亂發大絕，先用輕攻擊摸一下看對手反應。」" },
            { term: "完美勝利", bopomofo: "ㄨㄢˊ ㄇㄟˇ ㄕㄥˋ ㄌㄧˋ", pinyin: "wán měi shèng lì", english: "Perfect", etymology: "最早在《快打旋風II》滿血獲勝會出現PERFECT字樣。", definition: "一回合內完全沒有被對手打到任何一滴血，滿血無傷獲勝。", example: "「他這一局打得真好，完全沒被碰到，是完美勝利！」" },
            { term: "仇恨失控 (OT)", bopomofo: "ㄔㄡˊ ㄏㄣˋ ㄕ ㄎㄨㄥˋ", pinyin: "chóu hèn shī kòng", english: "Over Threat", etymology: "Over Threat的縮寫。輸出或補師的仇恨超過坦克。", definition: "你的仇恨值超過了坦克，導致怪物轉頭來打你，通常會造成團隊混亂甚至滅團。", example: "「你別再輸出了，再打就要OT了，等坦克拉穩！」" },
            { term: "拉怪", bopomofo: "ㄌㄚ ㄍㄨㄞˋ", pinyin: "lā guài", english: "Pull", etymology: "「拉」是吸引帶動。避免隊友被怪物包圍。", definition: "坦克用技能吸引怪物仇恨，將其帶到適合團隊集中火力戰鬥的安全位置。", example: "「坦克去拉怪，其他人退後，不要亂動。」" },

                        <!-- 標題與英文 -->
                        <div class="mb-8 relative">
                            <h2 class="text-5xl font-black text-white italic tracking-wide mb-3 relative z-10 group-hover:text-cyan-300 transition-colors">${item.term}</h2>
                            <span class="text-cyan-400 font-mono text-lg font-black border border-cyan-900/50 bg-cyan-950/30 px-3 py-1 rounded shadow-[0_0_10px_rgba(6,182,212,0.1)] uppercase tracking-wider inline-block">${item.english}</span>
                        </div>

                        <div class="space-y-6">
                            <!-- 釋義 -->
                            <div class="bg-black/40 p-5 rounded-xl border border-slate-800/80 shadow-inner">
                                <h3 class="text-sm text-fuchsia-400 uppercase tracking-widest font-black mb-3 flex items-center gap-2 border-b border-slate-800 pb-2">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    詳細釋義
                                </h3>
                                <p class="text-slate-100 text-base leading-relaxed font-medium">${item.definition}</p>
                            </div>

                            <!-- 範例 -->
                            <div>
                                <h3 class="text-xs text-slate-500 uppercase tracking-widest font-bold mb-2 px-1">實戰情境範例</h3>
                                <blockquote class="border-l-[4px] border-cyan-500 bg-gradient-to-r from-cyan-900/20 to-transparent pl-4 py-3 rounded-r-lg italic text-slate-200 text-sm font-medium leading-relaxed">
                                    ${item.example}
                                </blockquote>
                            </div>

                            <!-- 詞源 -->
                            <div>
                                <h3 class="text-xs text-slate-500 uppercase tracking-widest font-bold mb-2 px-1">歷史與詞源</h3>
                                <p class="text-slate-400 text-sm leading-relaxed">${item.etymology}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            pagesHtml.push(itemHtml);
        });

        // 封底
        if (pagesHtml.length % 2 !== 0) pagesHtml.push(`<div class="page-content"></div>`);
        
        pagesHtml.push(`
            <div class="page-content justify-center items-center cover-page text-center">
                <div class="w-16 h-16 rounded-full border-2 border-slate-800 flex items-center justify-center text-slate-600 mb-4">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h2 class="text-xl font-bold tracking-widest text-slate-400 mb-2">感謝您的閱讀</h2>
                <p class="text-slate-600 text-sm">線上遊戲用語電子辭典 (全書終)</p>
            </div>
        `);

        // === 組裝目錄 (TOC) ===
        let tocHtml = `
            <div class="page-content">
                <h2 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 mb-8 border-b border-slate-700 pb-2">
                    系統目錄 INDEX
                </h2>
                <ul class="space-y-6 flex-grow">
        `;
        tocData.forEach((item, index) => {
            const leafTarget = Math.floor(item.page / 2);
            tocHtml += `
                <li class="cursor-pointer group flex items-baseline" onclick="event.stopPropagation(); flipToLeaf(${leafTarget})">
                    <span class="text-fuchsia-500 font-bold mr-4 text-lg">0${index+1}</span>
                    <span class="text-slate-200 text-lg group-hover:text-cyan-300 transition-colors border-b border-transparent group-hover:border-cyan-300 font-medium">${item.title}</span>
                    <div class="flex-grow border-b border-dotted border-slate-600 mx-4 opacity-50 relative top-[-4px]"></div>
                    <span class="text-slate-500 font-mono text-sm">P.${item.page}</span>
                </li>
            `;
        });
        tocHtml += `</ul></div>`;
        pagesHtml[tocPageIndex] = tocHtml; 

        // === 組裝注音滿版檢索頁 ===
        let zhuyinHtml = `
            <div class="page-content">
                <h2 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-fuchsia-400 to-cyan-400 mb-6 border-b border-slate-700 pb-2">
                    注音符號快速檢索
                </h2>
                <div class="grid grid-cols-5 gap-3 flex-grow content-start">
        `;
        bopomofoOrder.forEach(char => {
            if (bopoPageMap[char] !== undefined) {
                const targetLeaf = bopoPageMap[char];
                zhuyinHtml += `
                    <button onclick="event.stopPropagation(); flipToLeaf(${targetLeaf})" class="h-12 flex items-center justify-center text-lg font-bold text-cyan-300 border border-cyan-900/50 bg-cyan-950/30 rounded-lg hover:bg-fuchsia-600 hover:border-fuchsia-400 hover:text-white transition-all shadow-[0_0_10px_rgba(6,182,212,0.1)] hover:shadow-[0_0_15px_rgba(217,70,239,0.5)] hover:-translate-y-1">
                        ${char}
                    </button>
                `;
            } else {
                zhuyinHtml += `
                    <div class="h-12 flex items-center justify-center text-lg font-bold text-slate-700 border border-slate-800/30 bg-slate-900/20 rounded-lg opacity-50 cursor-not-allowed">
                        ${char}
                    </div>
                `;
            }
        });
        zhuyinHtml += `</div></div>`;
        pagesHtml[zhuyinIndexPageIndex] = zhuyinHtml;

        const thumbIndexEl = document.getElementById('thumb-index');
        bopomofoOrder.forEach(char => {
            if (bopoPageMap[char] !== undefined) {
                const btn = document.createElement('div');
                btn.className = 'thumb-btn';
                btn.textContent = char;
                btn.onclick = () => {
                    document.querySelectorAll('.thumb-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    flipToLeaf(bopoPageMap[char]);
                };
                thumbIndexEl.appendChild(btn);
            }
        });

        const bookEl = document.getElementById('book');
        let leaves = [];
        
        for (let i = 0; i < pagesHtml.length; i += 2) {
            const leaf = document.createElement('div');
            leaf.className = 'leaf';
            leaf.dataset.index = i / 2;
            
            leaf.onclick = function() {
                if (this.classList.contains('flipped')) {
                    prevPage();
                } else {
                    nextPage();
                }
            };

            const front = document.createElement('div');
            front.className = 'page-front';
            front.innerHTML = pagesHtml[i] + `<div class="page-number">${i === 0 ? '' : i}</div>`;

            const back = document.createElement('div');
            back.className = 'page-back';
            const backContent = (i + 1 < pagesHtml.length) ? pagesHtml[i + 1] : '<div class="page-content"></div>';
            back.innerHTML = backContent + `<div class="page-number">${(i + 1) === pagesHtml.length - 1 ? '' : (i + 1)}</div>`;

            leaf.appendChild(front);
            leaf.appendChild(back);
            bookEl.appendChild(leaf);
            leaves.push(leaf);
        }

        let currentLeaf = 0; 

        function updateZIndex() {
            leaves.forEach((leaf, idx) => {
                if (idx < currentLeaf) {
                    leaf.style.zIndex = idx;
                } else {
                    leaf.style.zIndex = leaves.length - idx;
                }
            });
            updateActiveThumb(); 
        }

        function nextPage() {
            if (currentLeaf < leaves.length) {
                leaves[currentLeaf].classList.add('flipped');
                currentLeaf++;
                updateZIndex();
            }
        }

        function prevPage() {
            if (currentLeaf > 0) {
                currentLeaf--;
                leaves[currentLeaf].classList.remove('flipped');
                updateZIndex();
            }
        }

        function flipToLeaf(targetIndex) {
            while(currentLeaf < targetIndex) {
                leaves[currentLeaf].classList.add('flipped');
                currentLeaf++;
            }
            while(currentLeaf > targetIndex) {
                currentLeaf--;
                leaves[currentLeaf].classList.remove('flipped');
            }
            updateZIndex();
        }

        function updateActiveThumb() {
            let activeChar = null;
            Object.keys(bopoPageMap).forEach(char => {
                if (bopoPageMap[char] <= currentLeaf) {
                    if (!activeChar || bopoPageMap[char] > bopoPageMap[activeChar]) {
                        activeChar = char;
                    }
                }
            });

            document.querySelectorAll('.thumb-btn').forEach(b => {
                if (b.textContent === activeChar) {
                    b.classList.add('active');
                } else {
                    b.classList.remove('active');
                }
            });
        }

        updateZIndex();

        function resizeBook() {
            const wrapper = document.getElementById('book-wrapper');
            const w = window.innerWidth;
            const h = window.innerHeight;
            
            const scale = Math.min((w - 100) / 860, (h - 150) / 640);
            if (scale < 1) {
                wrapper.style.transform = `scale(${scale})`;
            } else {
                wrapper.style.transform = `scale(1)`;
            }
        }
        window.addEventListener('resize', resizeBook);
        resizeBook();

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                nextPage();
            } else if (e.key === 'ArrowLeft') {
                prevPage();
            }
        });

    </script>
</body>
</html>
